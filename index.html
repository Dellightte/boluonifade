<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Bolu — Doctor & Healthcare Marketer</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />

  <style>
    /* ── Design tokens ──────────────────────────────────────────────── */
    @property --accent {
      syntax: '<color>';
      inherits: true;
      initial-value: oklch(0.34 0.070 250);
    }
    :root {
      transition: --accent 1.4s cubic-bezier(0.22, 1, 0.36, 1);
    }
    :root {
      /* Soft clinical (default) */
      --bg:        oklch(0.972 0.008 85);
      --surface:   oklch(0.985 0.006 85);
      --ink:       oklch(0.22 0.025 250);
      --ink-soft:  oklch(0.40 0.020 250);
      --ink-mute:  oklch(0.58 0.015 250);
      --hair:      oklch(0.88 0.010 90);
      --hair-soft: oklch(0.92 0.008 90);
      --accent:    oklch(0.34 0.070 250);   /* deep navy */
      --accent-ink: oklch(0.98 0.005 85);

      --serif: "Instrument Serif", "Source Serif 4", Georgia, serif;
      --sans:  "Geist", ui-sans-serif, -apple-system, sans-serif;
      --mono:  "Geist Mono", ui-monospace, "SF Mono", Menlo, monospace;

      --maxw: 1240px;
      --pad-x: clamp(20px, 4vw, 56px);
    }

    /* Aesthetic presets — set as a data attr on <html> */
    html[data-aesthetic="editorial"] {
      --bg:        oklch(0.955 0.014 80);     /* warmer bone */
      --surface:   oklch(0.975 0.012 80);
      --hair:      oklch(0.86 0.020 75);
      --hair-soft: oklch(0.91 0.014 75);
      --ink:       oklch(0.23 0.030 50);      /* warmer ink */
      --ink-soft:  oklch(0.42 0.025 50);
      --ink-mute:  oklch(0.58 0.018 50);
    }
    html[data-aesthetic="modern"] {
      --bg:        oklch(0.965 0.004 250);
      --surface:   oklch(0.985 0.003 250);
      --hair:      oklch(0.88 0.008 250);
      --hair-soft: oklch(0.93 0.006 250);
      --ink:       oklch(0.16 0.018 250);
      --ink-soft:  oklch(0.34 0.015 250);
      --ink-mute:  oklch(0.55 0.012 250);
    }

    /* ── Base ───────────────────────────────────────────────────────── */
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      font-size: 17px;
      line-height: 1.55;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    a { color: inherit; text-decoration: none; }
    ::selection { background: var(--accent); color: var(--accent-ink); }

    .container {
      max-width: var(--maxw);
      margin: 0 auto;
      padding-inline: var(--pad-x);
    }

    .mono { font-family: var(--mono); font-size: 12px; letter-spacing: 0.02em; }
    .eyebrow {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-mute);
    }
    .num {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--ink-mute);
      font-feature-settings: "tnum" 1;
    }

    /* ── Nav ────────────────────────────────────────────────────────── */
    .nav {
      position: sticky;
      top: 0;
      z-index: 50;
      background: color-mix(in oklab, var(--bg) 88%, transparent);
      backdrop-filter: saturate(140%) blur(10px);
      border-bottom: 1px solid var(--hair-soft);
    }
    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      padding-inline: var(--pad-x);
      max-width: var(--maxw);
      margin: 0 auto;
    }
    .brand {
      display: flex;
      align-items: baseline;
      gap: 10px;
      font-family: var(--serif);
      font-size: 22px;
      font-weight: 400;
    }
    .brand .dot {
      width: 7px; height: 7px;
      border-radius: 999px;
      background: var(--accent);
      display: inline-block;
      transform: translateY(-2px);
    }
    .brand .role {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-mute);
      white-space: nowrap;
    }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
    }
    .nav-links a {
      font-size: 13px;
      color: var(--ink-soft);
      transition: color 0.15s;
    }
    .nav-links a:hover { color: var(--ink); }
    a.nav-cta {
      font-family: var(--sans);
      font-size: 13.5px;
      font-weight: 500;
      letter-spacing: 0.005em;
      padding: 10px 18px;
      border-radius: 999px;
      border: 1px solid var(--ink);
      background: var(--ink);
      color: var(--accent-ink);
      transition: transform 0.15s, background 0.15s;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    a.nav-cta:hover { color: var(--accent-ink); }
    a.nav-cta .arrow {
      display: inline-block;
      transition: transform 0.2s;
      font-size: 13px;
      line-height: 1;
      opacity: 0.85;
    }
    a.nav-cta:hover .arrow { transform: translate(2px, -2px); }
    .nav-cta:hover { transform: translateY(-1px); }
    @media (max-width: 720px) {
      .nav-links a:not(.nav-cta) { display: none; }
    }

    /* ── Hero ───────────────────────────────────────────────────────── */
    .hero {
      padding-block: clamp(64px, 9vw, 140px) clamp(60px, 8vw, 110px);
      border-bottom: 1px solid var(--hair-soft);
      position: relative;
    }
    .hero-meta {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: clamp(40px, 6vw, 72px);
      flex-wrap: wrap;
    }
    .hero-meta .left { display: flex; gap: 32px; flex-wrap: wrap; }
    .hero-meta .right { color: var(--ink-mute); font-family: var(--mono); font-size: 12px; }
    .hero-meta .pill {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: var(--mono); font-size: 12px; color: var(--ink-soft);
    }
    .hero-meta .pill::before {
      content: "";
      width: 6px; height: 6px; border-radius: 999px;
      background: oklch(0.65 0.18 145);
      box-shadow: 0 0 0 3px oklch(0.65 0.18 145 / 0.18);
    }

    .display {
      font-family: var(--serif);
      font-weight: 400;
      font-size: clamp(44px, 7.2vw, 116px);
      line-height: 0.98;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin: 0;
      max-width: 17ch;
      text-wrap: balance;
    }
    .display em {
      font-style: italic;
      color: var(--accent);
      font-weight: 400;
    }
    .display .ink-soft { color: var(--ink-soft); }

    .hero-foot {
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      gap: clamp(28px, 5vw, 80px);
      margin-top: clamp(40px, 6vw, 72px);
      align-items: end;
    }
    @media (max-width: 820px) {
      .hero-foot { grid-template-columns: 1fr; gap: 40px; }
    }
    .hero-sub {
      font-size: clamp(17px, 1.4vw, 19px);
      line-height: 1.55;
      color: var(--ink-soft);
      max-width: 46ch;
      margin: 0;
    }
    .hero-sub strong { color: var(--ink); font-weight: 500; }
    .hero-cta-row {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      align-items: center;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 22px;
      border-radius: 999px;
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 500;
      transition: transform 0.15s, background 0.15s, border-color 0.15s;
      border: 1px solid transparent;
      cursor: pointer;
    }
    .btn-primary {
      background: var(--accent);
      color: var(--accent-ink);
    }
    .btn-primary:hover { transform: translateY(-1px); }
    .btn-ghost {
      background: transparent;
      color: var(--ink);
      border-color: var(--hair);
    }
    .btn-ghost:hover { border-color: var(--ink); }
    .btn .arrow {
      display: inline-block;
      transition: transform 0.2s;
    }
    .btn:hover .arrow { transform: translate(2px, -2px); }

    /* ── Section scaffold ───────────────────────────────────────────── */
    section.block {
      padding-block: clamp(72px, 9vw, 130px);
      border-bottom: 1px solid var(--hair-soft);
    }
    .section-head {
      display: grid;
      grid-template-columns: 80px 1fr;
      gap: 24px;
      margin-bottom: clamp(40px, 5vw, 72px);
      align-items: baseline;
    }
    @media (max-width: 640px) {
      .section-head { grid-template-columns: 1fr; gap: 8px; }
    }
    .section-head h2 {
      font-family: var(--serif);
      font-weight: 400;
      font-size: clamp(30px, 4vw, 52px);
      line-height: 1.05;
      letter-spacing: -0.01em;
      margin: 0;
      max-width: 18ch;
      text-wrap: balance;
    }
    .section-head h2 em { font-style: italic; color: var(--accent); }

    /* hide section number when tweak off */
    html[data-show-numbers="false"] .section-head { grid-template-columns: 1fr; }
    html[data-show-numbers="false"] .section-head .num { display: none; }

    /* ── Services ──────────────────────────────────────────────────── */
    .services {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border-top: 1px solid var(--hair);
    }
    @media (max-width: 900px) {
      .services { grid-template-columns: 1fr; }
    }
    .service {
      padding: 40px 32px 36px;
      border-right: 1px solid var(--hair);
      border-bottom: 1px solid var(--hair);
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-height: 340px;
      position: relative;
      transition: background 0.2s;
    }
    .service:last-child { border-right: 0; }
    @media (max-width: 900px) {
      .service { border-right: 0; }
    }
    .service:hover { background: var(--surface); }
    .service .idx {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--ink-mute);
      letter-spacing: 0.04em;
    }
    .service h3 {
      font-family: var(--serif);
      font-weight: 400;
      font-size: 30px;
      line-height: 1.1;
      letter-spacing: -0.01em;
      margin: 0;
      max-width: 14ch;
    }
    .service p {
      color: var(--ink-soft);
      font-size: 15px;
      line-height: 1.55;
      margin: 0;
    }
    .service ul {
      list-style: none;
      padding: 0;
      margin: auto 0 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .service li {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--ink-soft);
      padding-left: 18px;
      position: relative;
    }
    .service li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 8px;
      width: 8px;
      height: 1px;
      background: var(--accent);
    }

    /* ── About / Credibility ───────────────────────────────────────── */
    .about-grid {
      display: grid;
      grid-template-columns: 0.85fr 1.15fr;
      gap: clamp(36px, 5vw, 80px);
      align-items: start;
    }
    @media (max-width: 880px) {
      .about-grid { grid-template-columns: 1fr; }
    }
    .portrait-wrap {
      position: relative;
      aspect-ratio: 4 / 5;
      width: 100%;
      max-width: 420px;
    }
    .portrait-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 22%;
      border-radius: 4px;
      border: 1px solid var(--hair);
      display: block;
      filter: saturate(0.95);
    }
    .portrait-caption {
      margin-top: 14px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--ink-mute);
      letter-spacing: 0.04em;
      display: flex;
      justify-content: space-between;
    }

    .about-copy h3 {
      font-family: var(--serif);
      font-weight: 400;
      font-size: clamp(26px, 3vw, 38px);
      line-height: 1.15;
      letter-spacing: -0.01em;
      margin: 0 0 18px;
      max-width: 20ch;
    }
    .about-copy p {
      color: var(--ink-soft);
      font-size: 16px;
      line-height: 1.6;
      margin: 0 0 14px;
      max-width: 56ch;
    }
    .about-copy p strong { color: var(--ink); font-weight: 500; }

    .credentials {
      margin-top: 36px;
      border-top: 1px solid var(--hair);
    }
    .credential {
      display: grid;
      grid-template-columns: 130px 1fr;
      gap: 24px;
      padding: 18px 0;
      border-bottom: 1px solid var(--hair);
      align-items: baseline;
    }
    @media (max-width: 560px) {
      .credential { grid-template-columns: 1fr; gap: 4px; padding: 14px 0; }
    }
    .credential .k {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-mute);
      padding-top: 2px;
    }
    .credential .v { font-size: 15px; color: var(--ink); }
    .credential .v small { display: block; color: var(--ink-mute); font-size: 13px; margin-top: 3px; }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .chip {
      font-family: var(--mono);
      font-size: 11px;
      padding: 5px 10px;
      border-radius: 999px;
      border: 1px solid var(--hair);
      color: var(--ink-soft);
      background: var(--surface);
      white-space: nowrap;
    }

    /* ── Portfolio waitlist ────────────────────────────────────────── */
    .portfolio-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }
    @media (max-width: 900px) {
      .portfolio-cards { grid-template-columns: 1fr; }
    }
    .case {
      position: relative;
      aspect-ratio: 4 / 5;
      border-radius: 6px;
      background:
        repeating-linear-gradient(
          135deg,
          var(--hair-soft) 0,
          var(--hair-soft) 1px,
          transparent 1px,
          transparent 14px
        ),
        var(--surface);
      border: 1px solid var(--hair);
      padding: 24px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s;
    }
    .case:hover { border-color: var(--accent); }
    .case .case-tag {
      align-self: flex-start;
      font-family: var(--mono);
      font-size: 10.5px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 5px 9px;
      border-radius: 4px;
      background: var(--bg);
      border: 1px solid var(--hair);
      color: var(--ink-mute);
    }
    .case .case-meta {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--ink-mute);
      display: flex;
      justify-content: space-between;
    }
    .case h4 {
      font-family: var(--serif);
      font-weight: 400;
      font-size: 22px;
      line-height: 1.15;
      margin: 0;
      color: var(--ink);
      max-width: 14ch;
    }

    .waitlist {
      margin-top: 36px;
      padding: 28px 32px;
      border-radius: 6px;
      background: var(--surface);
      border: 1px solid var(--hair);
      display: flex;
      gap: 32px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }
    .waitlist .copy {
      max-width: 52ch;
    }
    .waitlist .copy strong {
      font-family: var(--serif);
      font-weight: 400;
      font-style: italic;
      font-size: 22px;
      color: var(--ink);
      display: block;
      margin-bottom: 4px;
    }
    .waitlist .copy span {
      color: var(--ink-soft);
      font-size: 14px;
    }

    /* ── Final CTA ─────────────────────────────────────────────────── */
    .final {
      padding-block: clamp(80px, 12vw, 180px);
      position: relative;
      overflow: hidden;
    }
    .final::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(
          60% 60% at 80% 30%,
          color-mix(in oklab, var(--accent) 18%, transparent),
          transparent 70%
        );
      pointer-events: none;
    }
    .final-inner {
      position: relative;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 40px;
      align-items: end;
    }
    @media (max-width: 760px) {
      .final-inner { grid-template-columns: 1fr; gap: 28px; }
    }
    .final h2 {
      font-family: var(--serif);
      font-weight: 400;
      font-size: clamp(38px, 6vw, 88px);
      line-height: 1.0;
      letter-spacing: -0.02em;
      margin: 0;
      max-width: 14ch;
      text-wrap: balance;
    }
    .final h2 em { font-style: italic; color: var(--accent); }
    .final .mail-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: var(--mono);
      font-size: 14px;
      padding: 14px 18px;
      border-radius: 999px;
      border: 1px solid var(--ink);
      color: var(--ink);
      transition: background 0.15s, color 0.15s;
    }
    .final .mail-link:hover { background: var(--ink); color: var(--accent-ink); }

    /* ── Footer ────────────────────────────────────────────────────── */
    footer {
      padding-block: 32px 36px;
      border-top: 1px solid var(--hair-soft);
      display: flex;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      color: var(--ink-mute);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.04em;
    }
    footer a:hover { color: var(--ink); }

    /* ── Headline crossfade switcher ──────────────────────────────── */
    .headline-stack {
      display: grid;
      position: relative;
    }
    .headline-slot {
      grid-area: 1 / 1;            /* every variant occupies the same cell      */
      display: block;              /* — grid sizes to the TALLEST so layout       */
      opacity: 0;                  /*   below the headline never jumps.           */
      transform: translateY(14px);
      pointer-events: none;
      transition:
        opacity 1.6s cubic-bezier(0.22, 1, 0.36, 1),
        transform 1.6s cubic-bezier(0.22, 1, 0.36, 1);
      will-change: opacity, transform;
    }
    .headline-slot.active {
      opacity: 1;
      transform: none;
      pointer-events: auto;
    }

    /* ── Add-on service band ─────────────────────────────────────── */
    .addon-band {
      margin-top: 28px;
      border: 1px solid var(--hair);
      border-radius: 6px;
      background: var(--surface);
      overflow: hidden;
      display: grid;
      grid-template-columns: 12px 1fr;
      transition: border-color 0.3s;
    }
    .addon-band:hover { border-color: var(--accent); }
    .addon-stripe { background: var(--accent); transition: background 1.4s ease; }
    .addon-content {
      padding: 36px clamp(24px, 4vw, 44px);
      display: grid;
      grid-template-columns: 0.95fr 1.05fr;
      gap: clamp(28px, 4vw, 48px);
      align-items: start;
    }
    @media (max-width: 760px) {
      .addon-content { grid-template-columns: 1fr; gap: 22px; padding: 28px 24px; }
    }
    .addon-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
      transition: color 1.4s ease;
    }
    .addon-tag::before {
      content: "+";
      font-weight: 600;
      font-size: 14px;
      line-height: 1;
    }
    .addon-content h3 {
      font-family: var(--serif);
      font-weight: 400;
      font-size: clamp(26px, 2.6vw, 34px);
      line-height: 1.1;
      letter-spacing: -0.01em;
      margin: 0 0 12px;
      max-width: 17ch;
    }
    .addon-content p {
      color: var(--ink-soft);
      font-size: 15px;
      line-height: 1.6;
      margin: 0 0 14px;
      max-width: 50ch;
    }
    .addon-bullets {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 28px;
    }
    @media (max-width: 520px) {
      .addon-bullets { grid-template-columns: 1fr; }
    }
    .addon-bullets li {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--ink-soft);
      padding-left: 18px;
      position: relative;
    }
    .addon-bullets li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 8px;
      width: 8px;
      height: 1px;
      background: var(--accent);
      transition: background 1.4s ease;
    }
  </style>
</head>
<body>

<div id="root"></div>

<script>
  // Benign ResizeObserver loop warning fires harmlessly during layout — swallow it.
  const __resizeMsg = 'ResizeObserver loop';
  window.addEventListener('error', (e) => {
    if (e.message && e.message.includes(__resizeMsg)) {
      e.stopImmediatePropagation();
      e.preventDefault();
    }
  }, true);
  const __origErr = console.error;
  console.error = function (...args) {
    const first = args[0];
    if (typeof first === 'string' && first.includes(__resizeMsg)) return;

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // deck-stage enables its rail in connectedCallback, but this panel can
  // mount before that element has upgraded. The initial read catches the
  // common case; the listener covers mounting first. (Older deck-stage.js
  // copies still wait for the host's __omelette_rail_enabled postMessage —
  // same listener handles those.)
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>
<script type="text/babel" data-presets="react">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "headlineVariant": 0,
  "aesthetic": "clinical",
  "accent": "navy",

  "showSectionNumbers": true,
  "cycleHeadlines": true,
  "cycleAccent": true,
  "cycleSeconds": 10
}/*EDITMODE-END*/;

  navy:     { value: "oklch(0.34 0.070 250)", swatch: "#1f3a68" },
  forest:   { value: "oklch(0.40 0.060 155)", swatch: "#2d5a47" },
  charcoal: { value: "oklch(0.26 0.010 250)", swatch: "#2a2d36" },

};

    label: "Doctor-marketer",
    title: ({ Ink }) => (
      <>

function App() {

  // Local cycling indices — not persisted, so each load starts fresh.
  const [cycleHeadline, setCycleHeadline] = React.useState(0);

  const accentKeys = Object.keys(ACCENTS);

  // Auto-cycle headlines

    if (!t.cycleHeadlines) return;

    return () => clearInterval(id);
  }, [t.cycleHeadlines, t.cycleSeconds]);

  // Auto-cycle accent — offset by half a beat so they don't change in lockstep.
  React.useEffect(() => {
    if (!t.cycleAccent) return;
    const id = setInterval(() => {
      setCycleAccentIdx((i) => (i + 1) % accentKeys.length);
    }, Math.max(2, t.cycleSeconds) * 1000);
    return () => clearInterval(id);
  }, [t.cycleAccent, t.cycleSeconds, accentKeys.length]);

  // Resolve the active headline & accent — auto cycle wins when on.
  const activeHeadlineIdx = t.cycleHeadlines ? cycleHeadline : t.headlineVariant;
  const activeAccentKey   = t.cycleAccent    ? accentKeys[cycleAccentIdx] : t.accent;

  // Apply preset + accent to <html> via data attrs / inline CSS vars
  React.useEffect(() => {
    document.documentElement.setAttribute("data-aesthetic", t.aesthetic);
    document.documentElement.setAttribute(
      "data-show-numbers",
      t.showSectionNumbers ? "true" : "false"
    );
    document.documentElement.style.setProperty(
      "--accent",
      ACCENTS[activeAccentKey]?.value || ACCENTS.navy.value
    );
  }, [t.aesthetic, activeAccentKey, t.showSectionNumbers]);

  const variant = HEADLINES[activeHeadlineIdx] || HEADLINES[0];
  // (variant used implicitly through HeadlineSwitcher)

  return (
    <>

        <TweakSection label="Headline" />
        <TweakToggle
          label="Auto-cycle"
          value={t.cycleHeadlines}
          onChange={(v) => setTweak("cycleHeadlines", v)}

        <TweakSelect
          label={t.cycleHeadlines ? "Variant (cycling)" : "Variant"}
          value={t.cycleHeadlines ? activeHeadlineIdx : t.headlineVariant}
          options={HEADLINES.map((h, i) => ({ value: i, label: `${i + 1}. ${h.label}` }))}
          onChange={(v) => {
            setTweak("cycleHeadlines", false);
            setTweak("headlineVariant", Number(v));

          label="Preset"
          value={t.aesthetic}
          options={["clinical", "editorial", "modern"]}
          onChange={(v) => setTweak("aesthetic", v)}

        <TweakToggle
          label="Auto-cycle accent"
          value={t.cycleAccent}
          onChange={(v) => setTweak("cycleAccent", v)}
        />
        <TweakColor
          label={t.cycleAccent ? "Accent (cycling)" : "Accent"}
          value={ACCENTS[activeAccentKey]?.swatch}

  );
}
